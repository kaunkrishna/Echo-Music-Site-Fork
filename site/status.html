<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Service Status - Echo Music</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/status.css" />

    <link rel="icon" href="./assets/images/echo.png" />
  </head>
  <body>
    <nav id="navbar aria-label="Main Navigation">
      <div class="nav-inner">
        <a href="./index.html" class="nav-logo display-font" aria-label="Echo Music Home">
          <img src="./assets/images/echo.png" alt="Echo Music App Icon" class="nav-logo-img" />
          Echo Music
        </a>
        <div class="nav-links">
          <a href="./index.html" class="btn btn-primary ripple nav-action-btn">Back</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <header class="hero">
        <h1 class="display-lg u-margin-b-md">System Status</h1>
        <p class="body-md u-text-muted style-max-width-520">Real-time service monitoring</p>
      </header>

      <section aria-label="Status Controls">
        <div class="controls">
          <button id="force-ping-btn" class="btn btn-primary">Check Status Now</button>
        </div>

        <div class="timer-container u-text-muted">Next check in: <span id="countdown" class="timer-value">05:00</span></div>

        <div class="status-list" id="status-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="./js/status.js"></script>
  </body>
</html>
